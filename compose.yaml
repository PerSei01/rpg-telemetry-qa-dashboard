name: rpg-telemetry-qa-dashboard

services:
  db:
    image: postgres:17-alpine

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rpg_telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-telemetry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telemetry_password}

    ports:
      - "${POSTGRES_PORT:-5433}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    environment:
      DATABASE_URL: >-
        postgresql+psycopg://${POSTGRES_USER:-telemetry}:${POSTGRES_PASSWORD:-telemetry_password}@db:5432/${POSTGRES_DB:-rpg_telemetry}

    ports:
      - "${BACKEND_PORT:-8000}:8000"

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api

    ports:
      - "${FRONTEND_PORT:-8080}:80"

    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: