name: Continuous Integration

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: sqlite:///./ci-placeholder.db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest -v

  frontend-quality:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    needs:
      - backend-tests
      - frontend-quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and start Docker stack
        run: docker compose up --build --detach

      - name: Check backend health
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 20 \
            --retry-delay 3 \
            --retry-connrefused \
            http://localhost:8000/health

      - name: Check frontend
        run: |
          for attempt in {1..30}; do
            rm -f /tmp/frontend.html

            if curl \
              --fail \
              --silent \
              --show-error \
              --connect-timeout 2 \
              --max-time 5 \
              http://localhost:8080/ \
              --output /tmp/frontend.html \
              && grep -q '<div id="root"></div>' /tmp/frontend.html; then
              echo "Frontend is ready."
              exit 0
            fi

            echo "Frontend is not ready yet: attempt ${attempt}/30."
            sleep 2
          done

          echo "::error::Frontend did not become ready within 60 seconds."
          docker compose ps
          docker compose logs frontend
          exit 1

            - name: Check frontend API proxy
              run: |
                curl \
                  --fail \
                  --silent \
                  --show-error \
                  --retry 20 \
                  --retry-delay 3 \
                  --retry-connrefused \
                  http://localhost:8080/api/health

            - name: Show container status
              if: always()
              run: docker compose ps --all

            - name: Show Docker logs on failure
              if: failure()
              run: docker compose logs --no-color

            - name: Stop Docker stack
              if: always()
              run: docker compose down --volumes --remove-orphans

              - name: Check frontend API proxy
          run: |
            for attempt in {1..15}; do
              if curl \
                --fail \
                --silent \
                --show-error \
                --connect-timeout 2 \
                --max-time 5 \
                http://localhost:8080/api/health \
                | grep -q '"status":"ok"'; then
                echo "Frontend API proxy is ready."
                exit 0
              fi

              echo "Frontend API proxy is not ready yet: attempt ${attempt}/15."
              sleep 2
            done

            echo "::error::Frontend API proxy did not become ready."
            docker compose ps
            docker compose logs frontend backend
            exit 1